short_bio: >-
  <p>
    Welcome! I am currently a Ph.D. student at  <a href="https://rh.nankai.edu.cn/index.htm" target="_blank">RaHAIC</a> Group, 
    Nankai University, advised by Prof. <a href="https://rh.nankai.edu.cn/info/1016/1136.htm" target="_blank">Xuebo Zhang</a> and 
    Dr. <a href="https://rh.nankai.edu.cn/info/1016/1172.htm" target="_blank">Shiyong Zhang</a>.
  </p>

  <p>
    My research interests include Autonomous Exploration, Multi-robot System, Trajectory Planning, and Mapping. 
    You can check my open-source code on Github for detailed information.
  </p>

  <p>
    I will graduate in Jul. 2027. I plan to do postdoctoral research after graduation. So, if you would like to 
    offer me an opportunity, please let me know, I really appreciate it! 
  </p>


